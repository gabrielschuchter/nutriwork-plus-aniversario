<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f7fc" />
    <link rel="icon" href="/assets/favicon-nutriwork.png" type="image/png" />
    <script>
      (() => {
        const storageKey = 'nutriwork-theme';
        let theme = 'light';
        try {
          const savedTheme = localStorage.getItem(storageKey);
          theme = savedTheme === 'light' || savedTheme === 'dark'
            ? savedTheme
            : 'light';
        } catch {
          theme = 'light';
        }
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        document.querySelector('meta[name="theme-color"]').content = theme === 'light' ? '#f4f7fc' : '#02040a';
      })();
    </script>
    <meta name="description" content="Nutriwork Plus: formação em Nutrição com cursos organizados, comunidade, evidências científicas e o livro ESTUDE." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://gruponutriwork.com.br/" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nutriwork Plus | Nutrição baseada em evidências" />
    <meta property="og:description" content="Estude Nutrição com mais clareza, pensamento crítico, evidências científicas e uma comunidade que acompanha sua evolução." />
    <meta property="og:url" content="https://gruponutriwork.com.br/" />
    <meta property="og:image" content="https://gruponutriwork.com.br/assets/og-nutriwork.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,500;1,600&display=swap" rel="stylesheet" />
    <title>Nutriwork Plus | Plataforma de estudos em Nutrição</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
